<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TrainLog"/>
<meta name="theme-color" content="#0D0F12"/>
<title>TrainLog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0F12;--surface:#161A1F;--surface2:#1E242C;--border:#252D38;
  --text:#E8E8E8;--muted:#7B8FA1;--run:#FF5733;--gym:#00C896;--rest:#7B8FA1;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overscroll-behavior:none;-webkit-text-size-adjust:100%}
body{display:flex;flex-direction:column;min-height:100dvh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
button{font-family:'DM Mono',monospace;cursor:pointer}
input,textarea{font-family:'DM Mono',monospace}

header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px;background:var(–bg);border-bottom:1px solid var(–border);position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{color:var(–run);font-size:20px}
.logo-text{font-family:‘Bebas Neue’,sans-serif;font-size:24px;letter-spacing:5px;color:#fff}
.tabs{display:flex;gap:3px;background:var(–surface);border-radius:8px;padding:3px}
.tab{background:none;border:none;color:var(–muted);font-size:9px;letter-spacing:2px;padding:7px 13px;border-radius:6px;transition:all .15s}
.tab.active{background:var(–surface2);color:#fff}

/* CALENDAR */
#cal-view{padding:16px 16px 24px;flex:1}
.month-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.nav-btn{background:var(–surface);border:none;color:#fff;font-size:22px;width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.month-title{text-align:center}
.month-name{font-family:‘Bebas Neue’,sans-serif;font-size:26px;letter-spacing:3px;color:#fff;display:block}
.year-label{font-size:10px;color:var(–muted);letter-spacing:3px}
.day-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px}
.day-label{text-align:center;font-size:9px;letter-spacing:1px;color:var(–muted);padding:3px 0}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cell{min-height:64px;border-radius:9px;background:var(–surface);border:1px solid var(–border);padding:7px 5px;display:flex;flex-direction:column;gap:3px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.cell:active{opacity:.7;transform:scale(.97)}
.cell.today{border-color:rgba(255,87,51,.5)}
.cell.has-run{background:rgba(255,87,51,.1);border-color:rgba(255,87,51,.25)}
.cell.has-gym{background:rgba(0,200,150,.1);border-color:rgba(0,200,150,.25)}
.cell.has-rest{background:rgba(123,143,161,.1);border-color:rgba(123,143,161,.25)}
.day-num{font-size:11px;font-weight:500;color:var(–muted)}
.cell.today .day-num{color:var(–run)}
.session-emoji{font-size:15px;line-height:1}
.session-meta{font-size:9px;font-weight:500;letter-spacing:.5px}
.meta-run{color:var(–run)}
.meta-gym{color:var(–gym)}
.meta-rest{color:var(–rest)}
.legend{display:flex;gap:16px;justify-content:center;margin-top:16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(–muted);letter-spacing:1px}
.legend-dot{width:7px;height:7px;border-radius:50%}

/* STATS */
#stats-view{padding:20px 16px;display:none;flex:1}
.stats-title{font-family:‘Bebas Neue’,sans-serif;font-size:22px;letter-spacing:3px;color:#fff;margin-bottom:18px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(–surface);border-radius:12px;padding:16px 10px;text-align:center;border:1px solid var(–border)}
.stat-value{font-family:‘Bebas Neue’,sans-serif;font-size:32px;line-height:1}
.stat-unit{font-size:8px;color:var(–muted);letter-spacing:2px;margin-bottom:4px}
.stat-label{font-size:8px;color:var(–muted);letter-spacing:1px}
.progress-wrap{background:var(–surface);border-radius:12px;padding:18px;border:1px solid var(–border)}
.progress-label{font-size:10px;letter-spacing:3px;color:var(–muted);margin-bottom:12px}
.progress-bar{background:var(–bg);border-radius:4px;height:6px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(–run),#FF8C33);border-radius:4px;transition:width .6s ease}
.progress-sub{font-size:9px;color:var(–muted);letter-spacing:1px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.overlay.hidden{display:none}
.modal{background:var(–surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 20px calc(20px + env(safe-area-inset-bottom));border:1px solid var(–border);border-bottom:none}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-family:‘Bebas Neue’,sans-serif;font-size:20px;letter-spacing:3px;color:#fff}
.close-btn{background:var(–bg);border:none;color:var(–muted);width:28px;height:28px;border-radius:7px;font-size:12px}
.type-row{display:flex;gap:8px;margin-bottom:18px}
.type-btn{flex:1;background:var(–bg);border:1px solid var(–border);color:var(–muted);font-size:10px;letter-spacing:1px;padding:10px 4px;border-radius:9px;transition:all .15s}
.type-btn.active-run{background:var(–run);color:#fff;border-color:var(–run)}
.type-btn.active-gym{background:var(–gym);color:#fff;border-color:var(–gym)}
.type-btn.active-rest{background:var(–rest);color:#fff;border-color:var(–rest)}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field-full{grid-column:1/-1}
.field-label{font-size:8px;letter-spacing:3px;color:var(–muted)}
input[type=number],textarea{background:var(–bg);border:1px solid var(–border);border-radius:9px;color:#fff;padding:10px 12px;font-size:13px;outline:none;width:100%;-webkit-appearance:none}
textarea{min-height:70px;resize:vertical}
input[type=number]:focus,textarea:focus{border-color:var(–run)}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.save-btn{flex:1;background:var(–run);border:none;color:#fff;padding:13px;border-radius:10px;font-size:11px;letter-spacing:2px;font-weight:500}
.del-btn{background:var(–bg);border:1px solid rgba(255,87,51,.3);color:var(–run);padding:13px 16px;border-radius:10px;font-size:11px;letter-spacing:1px}
</style>

</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">◈</span>
    <span class="logo-text">TRAINLOG</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchView('cal')">MONTH</button>
    <button class="tab" onclick="switchView('stats')">STATS</button>
  </div>
</header>

<!-- CALENDAR VIEW -->

<div id="cal-view">
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-title">
      <span class="month-name" id="month-name"></span>
      <span class="year-label" id="year-label"></span>
    </div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="day-labels">
    <div class="day-label">MON</div><div class="day-label">TUE</div><div class="day-label">WED</div>
    <div class="day-label">THU</div><div class="day-label">FRI</div><div class="day-label">SAT</div><div class="day-label">SUN</div>
  </div>
  <div class="grid" id="cal-grid"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--run)"></div>Run</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gym)"></div>Gym</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--rest)"></div>Rest</div>
  </div>
</div>

<!-- STATS VIEW -->

<div id="stats-view">
  <div class="stats-title" id="stats-title"></div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-value" id="s-active" style="color:var(--run)">0</div><div class="stat-unit">days</div><div class="stat-label">Active</div></div>
    <div class="stat-card"><div class="stat-value" id="s-runs" style="color:var(--run)">0</div><div class="stat-unit">sessions</div><div class="stat-label">Runs</div></div>
    <div class="stat-card"><div class="stat-value" id="s-gym" style="color:var(--gym)">0</div><div class="stat-unit">sessions</div><div class="stat-label">Gym</div></div>
    <div class="stat-card"><div class="stat-value" id="s-rest" style="color:var(--rest)">0</div><div class="stat-unit">days</div><div class="stat-label">Rest</div></div>
    <div class="stat-card"><div class="stat-value" id="s-dist" style="color:var(--run)">0</div><div class="stat-unit">km</div><div class="stat-label">Distance</div></div>
    <div class="stat-card"><div class="stat-value" id="s-dur" style="color:var(--gym)">0</div><div class="stat-unit">min</div><div class="stat-label">Duration</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">MONTHLY PROGRESS</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-sub" id="progress-sub"></div>
  </div>
</div>

<!-- MODAL -->

<div class="overlay hidden" id="overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">April 1</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="type-row">
      <button class="type-btn" id="btn-run" onclick="selectType('run')">🏃 Run</button>
      <button class="type-btn" id="btn-gym" onclick="selectType('gym')">🏋️ Gym</button>
      <button class="type-btn" id="btn-rest" onclick="selectType('rest')">💤 Rest</button>
    </div>
    <div class="fields" id="extra-fields">
      <div class="field">
        <label class="field-label" id="dist-label">DISTANCE (KM)</label>
        <input type="number" id="inp-distance" placeholder="e.g. 5.2" step="0.1" min="0"/>
      </div>
      <div class="field">
        <label class="field-label">DURATION (MIN)</label>
        <input type="number" id="inp-duration" placeholder="e.g. 45" min="0"/>
      </div>
      <div class="field field-full">
        <label class="field-label">NOTES</label>
        <textarea id="inp-notes" placeholder="How did it feel?"></textarea>
      </div>
    </div>
    <div id="rest-fields" style="display:none;margin-bottom:12px">
      <div class="field">
        <label class="field-label">NOTES</label>
        <textarea id="inp-rest-notes" placeholder="Recovery notes..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="del-btn" id="del-btn" style="display:none" onclick="deleteSession()">Delete</button>
      <button class="save-btn" onclick="saveSession()">SAVE SESSION</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const today = new Date();
let cur = { year: today.getFullYear(), month: today.getMonth() };
let modalDay = null;
let selectedType = 'run';

// ── Storage ──
function storageKey(y, m) { return `trainlog_${y}_${m}`; }
function getSessions() {
  try { return JSON.parse(localStorage.getItem(storageKey(cur.year, cur.month)) || '{}'); } catch(e) { return {}; }
}
function saveSessions(data) {
  localStorage.setItem(storageKey(cur.year, cur.month), JSON.stringify(data));
}

// ── Views ──
function switchView(v) {
  document.getElementById('cal-view').style.display = v === 'cal' ? 'block' : 'none';
  document.getElementById('stats-view').style.display = v === 'stats' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&v==='cal')||(i===1&&v==='stats')));
  if (v === 'stats') renderStats();
}

// ── Calendar ──
function renderCal() {
  const { year, month } = cur;
  document.getElementById('month-name').textContent = MONTHS[month];
  document.getElementById('year-label').textContent = year;

  const firstDay = new Date(year, month, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const total = new Date(year, month + 1, 0).getDate();
  const sessions = getSessions();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.style.minHeight = '64px';
    grid.appendChild(el);
  }

  for (let d = 1; d <= total; d++) {
    const s = sessions[d];
    const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const el = document.createElement('div');
    el.className = 'cell' + (isToday ? ' today' : '') + (s ? ` has-${s.type}` : '');
    el.onclick = () => openModal(d);

    const num = document.createElement('span');
    num.className = 'day-num';
    num.textContent = d;
    el.appendChild(num);

    if (s) {
      const emoji = document.createElement('span');
      emoji.className = 'session-emoji';
      emoji.textContent = s.type === 'run' ? '🏃' : s.type === 'gym' ? '🏋️' : '💤';
      el.appendChild(emoji);
      if (s.distance) {
        const m = document.createElement('span');
        m.className = `session-meta meta-${s.type}`;
        m.textContent = s.distance + 'km';
        el.appendChild(m);
      } else if (s.duration) {
        const m = document.createElement('span');
        m.className = `session-meta meta-${s.type}`;
        m.textContent = s.duration + 'm';
        el.appendChild(m);
      }
    }
    grid.appendChild(el);
  }
}

function changeMonth(dir) {
  cur.month += dir;
  if (cur.month < 0) { cur.month = 11; cur.year--; }
  if (cur.month > 11) { cur.month = 0; cur.year++; }
  renderCal();
}

// ── Stats ──
function renderStats() {
  const sessions = getSessions();
  const total = new Date(cur.year, cur.month + 1, 0).getDate();
  let runs = 0, gym = 0, rest = 0, dist = 0, dur = 0;
  Object.values(sessions).forEach(s => {
    if (!s) return;
    if (s.type === 'run') runs++;
    if (s.type === 'gym') gym++;
    if (s.type === 'rest') rest++;
    if (s.distance) dist += parseFloat(s.distance) || 0;
    if (s.duration) dur += parseFloat(s.duration) || 0;
  });
  const active = runs + gym;
  document.getElementById('stats-title').textContent = MONTHS[cur.month] + ' Stats';
  document.getElementById('s-active').textContent = active;
  document.getElementById('s-runs').textContent = runs;
  document.getElementById('s-gym').textContent = gym;
  document.getElementById('s-rest').textContent = rest;
  document.getElementById('s-dist').textContent = dist.toFixed(1);
  document.getElementById('s-dur').textContent = Math.round(dur);
  const pct = Math.min(100, Math.round((active / total) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-sub').textContent = active + ' of ' + total + ' days logged';
}

// ── Modal ──
function openModal(day) {
  modalDay = day;
  const sessions = getSessions();
  const s = sessions[day];
  document.getElementById('modal-title').textContent = MONTHS[cur.month] + ' ' + day;
  selectType(s ? s.type : 'run');
  document.getElementById('inp-distance').value = s?.distance || '';
  document.getElementById('inp-duration').value = s?.duration || '';
  document.getElementById('inp-notes').value = s?.notes || '';
  document.getElementById('inp-rest-notes').value = s?.notes || '';
  document.getElementById('del-btn').style.display = s ? 'block' : 'none';
  document.getElementById('overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  modalDay = null;
}

function selectType(type) {
  selectedType = type;
  ['run','gym','rest'].forEach(t => {
    const btn = document.getElementById('btn-' + t);
    btn.className = 'type-btn' + (t === type ? ` active-${t}` : '');
  });
  document.getElementById('extra-fields').style.display = type !== 'rest' ? 'grid' : 'none';
  document.getElementById('rest-fields').style.display = type === 'rest' ? 'block' : 'none';
  document.getElementById('dist-label').textContent = type === 'run' ? 'DISTANCE (KM)' : 'WEIGHT (KG)';
}

function saveSession() {
  if (modalDay === null) return;
  const sessions = getSessions();
  const isRest = selectedType === 'rest';
  sessions[modalDay] = {
    type: selectedType,
    distance: isRest ? '' : (document.getElementById('inp-distance').value || ''),
    duration: isRest ? '' : (document.getElementById('inp-duration').value || ''),
    notes: isRest
      ? document.getElementById('inp-rest-notes').value
      : document.getElementById('inp-notes').value
  };
  saveSessions(sessions);
  closeModal();
  renderCal();
}

function deleteSession() {
  if (modalDay === null) return;
  const sessions = getSessions();
  delete sessions[modalDay];
  saveSessions(sessions);
  closeModal();
  renderCal();
}

// ── Init ──
renderCal();
</script>

</body>
</html>
